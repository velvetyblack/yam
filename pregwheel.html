<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pregwheel">
<meta name="theme-color" content="#5c2d91">
<title>Pregwheel</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%235c2d91'/%3E%3Ctext x='50' y='66' font-size='52' text-anchor='middle' fill='white' font-family='system-ui' font-weight='700'%3EP%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#d8c7eb;
  color:#1f2937;
  padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
  min-height:100vh;
  -webkit-text-size-adjust:100%;
}
h1{
  font-size:22px;
  margin:16px 0 12px;
  color:#5c2d91;
  text-align:center;
  font-weight:700;
}
.card{
  background:#fff;
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
label{
  display:block;
  font-size:13px;
  font-weight:600;
  color:#4b5563;
  margin-bottom:6px;
}
input[type=date],input[type=text],input[type=number]{
  width:100%;
  padding:12px;
  font-size:17px;
  border:1px solid #d1d5db;
  border-radius:9px;
  background:#fff;
  font-family:inherit;
  color:#1f2937;
  -webkit-appearance:none;
  appearance:none;
}
input:focus{
  outline:none;
  border-color:#5c2d91;
  box-shadow:0 0 0 3px rgba(92,45,145,.18);
}
.pair{display:flex;gap:8px}
.pair > *{flex:1}
.ga-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.ga-row input{flex:1}
.ga-row .suffix{font-size:13px;color:#6b7280}
.hint{font-size:12px;color:#6b7280;margin-top:6px}
.result{
  background:linear-gradient(135deg,#5c2d91,#7e3fb8);
  color:#fff;
  border-radius:14px;
  padding:18px;
  margin-top:4px;
}
.result-row{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  padding:6px 0;
}
.result-row + .result-row{border-top:1px solid rgba(255,255,255,.18)}
.result-label{font-size:13px;opacity:.85}
.result-value{font-size:18px;font-weight:700}
</style>
</head>
<body>

<h1>Pregwheel</h1>

<div class="card">
  <label>LMP</label>
  <div class="pair">
    <input type="date" id="lmp-date">
    <input type="text" id="lmp-text" placeholder="ddmmyyyy" inputmode="numeric">
  </div>
</div>

<div class="card">
  <label>EDC</label>
  <div class="pair">
    <input type="date" id="edc-date">
    <input type="text" id="edc-text" placeholder="ddmmyyyy" inputmode="numeric">
  </div>
</div>

<div class="card">
  <label>GA on a date</label>
  <div class="ga-row">
    <input type="number" id="ga-weeks" placeholder="wk" min="0" max="45" inputmode="numeric">
    <span class="suffix">wk</span>
    <input type="number" id="ga-days" placeholder="d" min="0" max="6" inputmode="numeric">
    <span class="suffix">d</span>
  </div>
  <div class="pair">
    <input type="date" id="ga-date">
    <input type="text" id="ga-text" placeholder="ddmmyyyy" inputmode="numeric">
  </div>
  <div class="hint">Date blank = today. Fill any card and the others update.</div>
</div>

<div class="card">
  <label>Check GA on another date</label>
  <div class="pair">
    <input type="date" id="q-date">
    <input type="text" id="q-text" placeholder="ddmmyyyy" inputmode="numeric">
  </div>
</div>

<div class="result" id="result" style="display:none">
  <div class="result-row"><span class="result-label">EDC</span><span class="result-value" id="r-edc">—</span></div>
  <div class="result-row"><span class="result-label">GA today</span><span class="result-value" id="r-ga-today">—</span></div>
  <div class="result-row" id="r-q-row" style="display:none"><span class="result-label" id="r-q-label">GA on date</span><span class="result-value" id="r-q">—</span></div>
</div>

<script>
const DAY = 86400000;
const addDays = (d,n) => new Date(d.getFullYear(), d.getMonth(), d.getDate()+n);
const daysBetween = (a,b) => Math.round(
  (Date.UTC(b.getFullYear(),b.getMonth(),b.getDate()) -
   Date.UTC(a.getFullYear(),a.getMonth(),a.getDate())) / DAY);
const fmt = d => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
const isoFmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

function today(){
  const t = new Date();
  return new Date(t.getFullYear(),t.getMonth(),t.getDate());
}

// Progressive dd/mm/yyyy formatting from bare digits
function digitsToFormatted(v){
  const d = v.replace(/\D/g,'').slice(0,8);
  let out = d.slice(0,2);
  if(d.length>2) out += '/'+d.slice(2,4);
  if(d.length>4) out += '/'+d.slice(4,8);
  return out;
}

// Accepts ddmmyyyy, ddmmyy, or any of those with separators
function parseTyped(s){
  if(!s) return null;
  const digits = s.replace(/\D/g,'');
  let d,mo,y;
  if(digits.length===8){ d=+digits.slice(0,2); mo=+digits.slice(2,4); y=+digits.slice(4); }
  else if(digits.length===6){ d=+digits.slice(0,2); mo=+digits.slice(2,4); y=+digits.slice(4); y += y<50?2000:1900; }
  else return null;
  const date = new Date(y,mo-1,d);
  return (date.getFullYear()===y && date.getMonth()===mo-1 && date.getDate()===d) ? date : null;
}

function parseIso(s){
  if(!s) return null;
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return null;
  const d = new Date(+m[1],+m[2]-1,+m[3]);
  return isNaN(d)?null:d;
}

function gaString(lmp, on){
  const days = daysBetween(lmp, on);
  if(days<0) return null;
  return `${Math.floor(days/7)}+${days%7}`;
}

// Keep a date picker + numpad text field in sync; auto-format digits as they're typed
function bindDate(dateId, textId, onChange){
  const dEl = document.getElementById(dateId);
  const tEl = document.getElementById(textId);
  dEl.addEventListener('change', () => {
    const d = parseIso(dEl.value);
    tEl.value = d ? fmt(d) : '';
    onChange(d);
  });
  tEl.addEventListener('input', e => {
    if(!e.inputType || !e.inputType.startsWith('delete')){
      tEl.value = digitsToFormatted(tEl.value);
    }
    const d = parseTyped(tEl.value);
    if(d) dEl.value = isoFmt(d);
    else if(!tEl.value) dEl.value = '';
    onChange(d);
  });
  return {
    get(){ return parseIso(dEl.value) || parseTyped(tEl.value); },
    set(d){ dEl.value = d?isoFmt(d):''; tEl.value = d?fmt(d):''; }
  };
}

let lmp = null;

const lmpF = bindDate('lmp-date','lmp-text', d => { if(d){ lmp = d; sync('lmp'); } });
const edcF = bindDate('edc-date','edc-text', d => { if(d){ lmp = addDays(d,-280); sync('edc'); } });
const gaDateF = bindDate('ga-date','ga-text', () => gaChanged());
const qF = bindDate('q-date','q-text', () => renderResult());

const weeksEl = document.getElementById('ga-weeks');
const daysEl = document.getElementById('ga-days');
weeksEl.addEventListener('input', gaChanged);
daysEl.addEventListener('input', gaChanged);

function gaChanged(){
  const w = parseInt(weeksEl.value,10);
  if(isNaN(w)) return;
  const d = parseInt(daysEl.value,10) || 0;
  const asOf = gaDateF.get() || today();
  lmp = addDays(asOf, -(w*7 + d));
  sync('ga');
}

function sync(source){
  if(!lmp) return;
  if(source!=='lmp') lmpF.set(lmp);
  if(source!=='edc') edcF.set(addDays(lmp,280));
  if(source!=='ga'){
    const asOf = gaDateF.get() || today();
    const dd = daysBetween(lmp, asOf);
    if(dd>=0){ weeksEl.value = Math.floor(dd/7); daysEl.value = dd%7; }
    else { weeksEl.value=''; daysEl.value=''; }
  }
  renderResult();
}

function renderResult(){
  if(!lmp) return;
  document.getElementById('result').style.display='block';
  document.getElementById('r-edc').textContent = fmt(addDays(lmp,280));
  document.getElementById('r-ga-today').textContent = gaString(lmp, today()) ?? '—';
  const q = qF.get();
  const row = document.getElementById('r-q-row');
  if(q){
    document.getElementById('r-q-label').textContent = `GA on ${fmt(q)}`;
    document.getElementById('r-q').textContent = gaString(lmp, q) ?? 'before LMP';
    row.style.display='flex';
  } else row.style.display='none';
}
</script>
</body>
</html>
